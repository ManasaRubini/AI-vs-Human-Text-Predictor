<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI vs Human Detector</title>
<style>
*{
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: 'Poppins', sans-serif;
}

body, html {
    height: 100%;
    width: 100%;
    /* Background image using Jinja2/Flask */
    background: url("{{ url_for('static', filename='image.png') }}") no-repeat center center;
    background-size: cover;
}

.hero {
    display: flex;
    height: 100vh;
    width: 100%;
}

.hero-left {
    flex: 1;
}

.hero-right {
    flex: 1;
    display: flex;
    font-family:cursive;
    justify-content: center; 
    align-items: center;     
    text-align: center;     
    padding: 20px;
}

.hero-right h1 {
    font-size: 100px;
    font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
    margin-bottom: 10px;
    color: #394a06;
    text-shadow: 0 0 5px rgba(0, 0, 0, 0.3);
}

.hero-right h2 {
    font-size: 30px;
    margin-bottom: 30px;
    color: #394a06;
    text-shadow: 0 0 5px rgba(15, 11, 11, 0.3);
}

.get-started {
    padding: 14px 50px;
    font-size: 20px;
    border-radius: 12px;
    background:linear-gradient(135deg,#8FD694,#F6C7A1);
    color: #394a06;
    border: none;
    cursor: pointer;
    text-shadow: 0 0 5px rgba(0,0,0,0.3);
    transition: all 0.3s ease;
}

.get-started:hover {
    transform: scale(1.05);
    box-shadow: 0 0 25px #e7e6f5;
}

@media (max-width: 768px) {
    .hero {
        flex-direction: column;
    }
    .hero-left, .hero-right {
        flex: none;
        width: 100%;
        height: 50vh;
    }
    .hero-right {
        text-align: center;
    }
}
</style>
</head>
<body>
<div class="hero">
    <div class="hero-left"></div>
    <div class="hero-right">
        <div>
            <h1>TEXT AURA</h1>
            <h2>Whose perspective is this?</h2>
            <a style="text-decoration: none;" href="{{ url_for('home_page') }}" class="get-started">Get Started</a>
</body>
</html>
